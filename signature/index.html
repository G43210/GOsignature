<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatherOne签名生成</title>
    <style>
        * {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFBFF;
            color: #000000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .full-screen-wrapper {
            width: 100%;
            max-width: 1300px;
            padding: 60px 40px;
        }
        
        .header {
            margin-bottom: 50px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .header h1 {
            margin: 0;
            font-size: 38px;
            font-weight: 300;
            letter-spacing: -1.5px;
            color: #000000;
            line-height: 1.1;
        }
        .steps {
            font-size: 13px;
            color: #9ca3af;
            margin-top: -40px;
            margin-bottom: 50px;
        }
        
        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 80px;
        }
        
        .form-area {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 13px;
            color: #111111;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 0px;
            color: #000000;
            font-size: 14px;
            transition: all 0.2s ease-in-out;
        }
        
        input:focus {
            outline: none;
            border-color: #000000;
        }
        
        .btn-copy {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 0px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .preview-box {
            background: transparent;
            border: 1px solid #000000;
            border-radius: 0px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 520px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: #ffffff;
            padding: 14px 35px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="full-screen-wrapper">
    <div class="header">
        <h1>GatherOne签名生成</h1>
    </div>
    <div class="steps">1. 填写信息 &nbsp;→&nbsp; 2. 复制HTML代码 &nbsp;→&nbsp; 3. 粘贴到邮件 <b>&lt;/&gt;</b> 源代码编辑器</div>

    <div class="main-layout">
        <div class="form-area">
            <div class="form-group"><label>姓名</label><input type="text" id="input-name" placeholder="姓名"></div>
            <div class="form-group"><label>职位</label><input type="text" id="input-title" placeholder="职位"></div>
            <div class="form-group"><label>电话</label><input type="text" id="input-tel" placeholder="电话"></div>
            <div class="form-group"><label>微信</label><input type="text" id="input-wechat" placeholder="微信"></div>
            <button class="btn-copy" id="btn-copy-id">确认并复制</button>
        </div>
        
        <div class="preview-area">
            <div class="preview-title" style="font-size: 13px; color: #111111; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;">预览</div>
            <div class="preview-box" id="copy-target"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast-msg">已复制</div>

<script>
    const nameInput = document.getElementById('input-name');
    const titleInput = document.getElementById('input-title');
    const telInput = document.getElementById('input-tel');
    const wechatInput = document.getElementById('input-wechat');
    const previewBox = document.getElementById('copy-target');
    const btnCopy = document.getElementById('btn-copy-id');

    const baseUrl = "https://cdn.jsdelivr.net/gh/G43210/GOsignature@main/signature/assets";
    const imgBar = baseUrl + "/v2_1.png?v=5";
    const imgLogo = baseUrl + "/v2_2.png?v=5";
    const imgPartner = baseUrl + "/v5_3.png?v=1";

    function render() {
        const name = nameInput.value || "姓名";
        const title = titleInput.value || "职位";
        const tel = telInput.value || "电话";
        const wechat = wechatInput.value || "微信";

        previewBox.innerHTML = `
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="color: #9f9f9f; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 12.001pt; text-decoration-color: initial; text-decoration-style: initial;">
<div></div>
<div class="qqmail_sign">
<div class="rich_custom_signature" style="position: relative;">
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="color: #9f9f9f; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 12.001pt; text-decoration-color: initial; text-decoration-style: initial;"><span style="color: #00cad3; font-size: 20.001pt;">${name}<span>&nbsp;</span></span><span>&nbsp;</span><span style="color: #00cad3; font-size: 12.001pt;">${title}</span><span style="color: #9f9f9f; font-size: 12.001pt;"><br /></span></div>
<div style="color: #00cad3; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 10.001pt; text-decoration-color: initial; text-decoration-style: initial;"><span style="color: #9f9f9f; font-size: 10.001pt;"><span>Tel </span></span><span style="color: #9f9f9f; font-size: 10.001pt;"><a href="tel:${tel}" style="border-bottom: none !important; color: #9f9f9f !important; font-size: 10.001pt; outline: none; text-decoration: none !important;"><span style="font-size: 10.001pt;"></span><span style="color: #9f9f9f !important; font-size: 10.001pt; text-decoration: none !important;">${tel}</span><span style="font-size: 10.001pt;"><span>&nbsp;</span></span></a>&nbsp; &nbsp;Wechat</span><span style="color: #9f9f9f; font-size: 10.001pt;"><span>&nbsp;</span></span><span style="color: #9f9f9f; font-size: 10.001pt;"><a href="tel:${tel}" style="border-bottom: none !important; color: #9f9f9f !important; font-size: 10.001pt; outline: none; text-decoration: none !important;"><span style="font-size: 10.001pt;"></span><span style="color: #9f9f9f !important; font-size: 10.001pt; text-decoration: none !important;">${wechat}</span></a></span></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"><img src="${imgBar}" width="600" style="border: 0px; display: initial; height: auto !important; max-width: 100%; vertical-align: bottom; width: 600px;" /></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"><img src="${imgLogo}" width="146" style="border: 0px; display: initial; height: auto !important; max-width: 100%; vertical-align: bottom; width: 146px;" /></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"><span style="color: #00cad3; font-size: 12.001pt;"><span style="color: #00cad3 !important; text-decoration: none !important;">&nbsp;</span></span></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="color: #9f9f9f; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 12.001pt; text-decoration-color: initial; text-decoration-style: initial;">
<div style="color: #9f9f9f; font-size: 10.001pt;"><a href="#" style="color: #9f9f9f !important; cursor: default !important; font-size: 10.001pt; outline: none; text-decoration: none !important;"><span style="color: #9f9f9f !important; font-size: 10.001pt; text-decoration: none !important;">北京：北京市朝阳区管庄路150号院东方华瑞C座9层</span></a></div>
<div style="color: #9f9f9f; font-size: 10.001pt;"><a href="#" style="color: #9f9f9f !important; cursor: default !important; font-size: 10.001pt; outline: none; text-decoration: none !important;"><span style="color: #9f9f9f !important; font-size: 10.001pt; text-decoration: none !important;">杭州：浙江省杭州市西湖区华星时代广场A座903室</span></a></div>
<div style="color: #9f9f9f; font-size: 10.001pt;"><a href="#" style="color: #9f9f9f !important; cursor: default !important; font-size: 10.001pt; outline: none; text-decoration: none !important;"><span style="color: #9f9f9f !important; font-size: 10.001pt; text-decoration: none !important;">长沙：湖南省长沙市保利国际广场B3栋1613室</span></a></div>
<div style="color: #9f9f9f; font-size: 10.001pt;"><a href="#" style="color: #9f9f9f !important; cursor: default !important; font-size: 10.001pt; outline: none; text-decoration: none !important;"><span style="color: #9f9f9f !important; font-size: 10.001pt; text-decoration: none !important;">深圳：广东省深圳市南山区大冲商务中心B座2203室</span></a></div>
<div style="color: #9f9f9f; font-size: 10.001pt;"><a href="#" style="color: #9f9f9f !important; cursor: default !important; font-size: 10.001pt; outline: none; text-decoration: none !important;"><span style="color: #9f9f9f !important; font-size: 10.001pt; text-decoration: none !important;">合肥：安徽省合肥市蜀山区潜山路华邦世贸中心B座603室</span></a></div>
<div style="color: #9f9f9f; font-size: 10.001pt;"><a href="#" style="color: #9f9f9f !important; cursor: default !important; font-size: 10.001pt; outline: none; text-decoration: none !important;"><span style="color: #9f9f9f !important; font-size: 10.001pt; text-decoration: none !important;">香港：香港金鐘金鐘道95號統一中心29層A20室</span></a></div>
<div style="color: #9f9f9f; font-size: 12.001pt;">&nbsp;</div>
</div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"></div>
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei'; font-size: 14.6667px; text-decoration-color: initial; text-decoration-style: initial;"><img src="${imgPartner}" width="600" style="border: 0px; display: initial; height: auto !important; max-width: 100%; vertical-align: bottom; width: 600px;" /></div>
<div></div>
<div></div>
<div></div>
</div>
</div>
</div>
<div></div>
<div></div>
<div></div>
        `;
    }

    [nameInput, titleInput, telInput, wechatInput].forEach(el => el.addEventListener('input', render));

    btnCopy.addEventListener('click', function() {
        const htmlCode = previewBox.innerHTML;
        navigator.clipboard.writeText(htmlCode).then(() => {
            const toast = document.getElementById('toast-msg');
            toast.textContent = 'HTML代码已复制，粘贴到邮件</>代码编辑器';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }).catch(() => {
            // fallback for older browsers
            const textarea = document.createElement('textarea');
            textarea.value = htmlCode;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            const toast = document.getElementById('toast-msg');
            toast.textContent = 'HTML代码已复制，粘贴到邮件</>代码编辑器';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        });
    });

    render();
</script>
</body>
</html>
