<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatherOne签名生成</title>
    <style>
        * {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFBFF;
            color: #000000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .full-screen-wrapper {
            width: 100%;
            max-width: 1300px;
            padding: 60px 40px;
        }
        
        .header {
            margin-bottom: 50px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .header h1 {
            margin: 0;
            font-size: 38px;
            font-weight: 300;
            letter-spacing: -1.5px;
            color: #000000;
            line-height: 1.1;
        }
        .steps {
            font-size: 13px;
            color: #9ca3af;
            margin-top: -40px;
            margin-bottom: 50px;
        }
        
        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 80px;
        }
        
        .form-area {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 13px;
            color: #111111;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 0px;
            color: #000000;
            font-size: 14px;
            transition: all 0.2s ease-in-out;
        }
        
        input:focus {
            outline: none;
            border-color: #000000;
        }
        
        .btn-copy {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 0px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .preview-box {
            background: transparent;
            border: 1px solid #000000;
            border-radius: 0px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 520px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: #ffffff;
            padding: 14px 35px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="full-screen-wrapper">
    <div class="header">
        <h1>GatherOne签名生成</h1>
    </div>
    <div class="steps">1. 填写信息 &nbsp;→&nbsp; 2. 复制HTML代码 &nbsp;→&nbsp; 3. 粘贴到邮件 <b>&lt;/&gt;</b> 源代码编辑器</div>

    <div class="main-layout">
        <div class="form-area">
            <div class="form-group"><label>姓名</label><input type="text" id="input-name" placeholder="姓名"></div>
            <div class="form-group"><label>职位</label><input type="text" id="input-title" placeholder="职位"></div>
            <div class="form-group"><label>电话</label><input type="text" id="input-tel" placeholder="电话"></div>
            <div class="form-group"><label>微信</label><input type="text" id="input-wechat" placeholder="微信"></div>
            <button class="btn-copy" id="btn-copy-id">确认并复制</button>
        </div>
        
        <div class="preview-area">
            <div class="preview-title" style="font-size: 13px; color: #111111; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;">预览</div>
            <div class="preview-box" id="copy-target"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast-msg">已复制</div>

<script>
    const nameInput = document.getElementById('input-name');
    const titleInput = document.getElementById('input-title');
    const telInput = document.getElementById('input-tel');
    const wechatInput = document.getElementById('input-wechat');
    const previewBox = document.getElementById('copy-target');
    const btnCopy = document.getElementById('btn-copy-id');

    const baseUrl = "https://cdn.jsdelivr.net/gh/G43210/GOsignature@main/signature/assets";
    const addrBannerUrl = baseUrl + "/image_1.png?v=4";
    const partner1Url = baseUrl + "/image_2.png?v=4";
    const partner2Url = baseUrl + "/image_3.png?v=4";

    function render() {
        const name = nameInput.value || "姓名";
        const title = titleInput.value || "职位";
        const tel = telInput.value || "电话";
        const wechat = wechatInput.value || "微信";

        previewBox.innerHTML = `
<div style="width:600px;font-family:'HONOR Sans CN','Microsoft YaHei',sans-serif;">
  <div style="width:600px;position:relative;">
    <div style="width:312px;">
      <div><span style="color:#00cad3;font-size:20pt;font-weight:300;">${name}</span><span style="color:#00cad3;font-size:12pt;font-weight:300;">&nbsp;&nbsp;${title}</span></div>
      <div style="margin-top:4px;"><span style="color:#9f9f9f;font-size:10pt;font-weight:300;">电话&nbsp;${tel}</span><span style="color:#9f9f9f;font-size:10pt;font-weight:300;">&nbsp;&nbsp;微信&nbsp;${wechat}</span></div>
    </div>
    <div style="position:absolute;right:0;bottom:0;color:#00cad3;font-size:10.5pt;font-weight:300;white-space:nowrap;">400-988-5518</div>
  </div>
  <div style="margin-top:8px;font-size:0;line-height:0;">
    <div style="display:inline-block;width:480px;height:4px;background:#00CBD4;"></div><div style="display:inline-block;width:80px;height:4px;background:#FF8AC5;"></div><div style="display:inline-block;width:40px;height:4px;background:#887BFF;"></div>
  </div>
  <div style="margin-top:24px;">
    <img src="${addrBannerUrl}" width="600" style="display:block;width:600px;height:auto;border:0;" />
  </div>
  <div style="margin-top:8px;">
    <div style="color:#9f9f9f;font-size:10pt;font-weight:300;line-height:1.7;">北京：北京市朝阳区管庄路150号院东方华瑞C座9层</div>
    <div style="color:#9f9f9f;font-size:10pt;font-weight:300;line-height:1.7;">杭州：浙江省杭州市西湖区华星时代广场A座903</div>
    <div style="color:#9f9f9f;font-size:10pt;font-weight:300;line-height:1.7;">长沙：湖南省长沙市保利国际广场B3栋1613</div>
    <div style="color:#9f9f9f;font-size:10pt;font-weight:300;line-height:1.7;">深圳：广东省深圳市南山区华润置地大厦D座6层162</div>
    <div style="color:#9f9f9f;font-size:10pt;font-weight:300;line-height:1.7;">合肥：安徽省合肥市蜀山区潜山路华邦世贸中心B座603</div>
    <div style="color:#9f9f9f;font-size:10pt;font-weight:300;line-height:1.7;">香港：香港金鐘金鐘道95號統一中心29層A20室</div>
  </div>
  <div style="margin-top:24px;background:#00cad3;border-radius:4px;padding:8px 16px;">
    <div style="text-align:center;">
      <span style="color:#fff;font-size:12pt;font-weight:300;white-space:nowrap;">战略合作伙伴</span><img src="${partner1Url}" width="400" style="display:inline-block;width:400px;height:auto;vertical-align:middle;margin-left:24px;border:0;" />
    </div>
    <div style="text-align:center;margin-top:8px;">
      <span style="color:#fff;font-size:12pt;font-weight:300;white-space:nowrap;">全球合作伙伴</span><img src="${partner2Url}" width="400" style="display:inline-block;width:400px;height:auto;vertical-align:middle;margin-left:24px;border:0;" />
    </div>
  </div>
</div>
        `;
    }

    [nameInput, titleInput, telInput, wechatInput].forEach(el => el.addEventListener('input', render));

    btnCopy.addEventListener('click', function() {
        const htmlCode = previewBox.innerHTML;
        navigator.clipboard.writeText(htmlCode).then(() => {
            const toast = document.getElementById('toast-msg');
            toast.textContent = 'HTML代码已复制，粘贴到邮件</>代码编辑器';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }).catch(() => {
            // fallback for older browsers
            const textarea = document.createElement('textarea');
            textarea.value = htmlCode;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            const toast = document.getElementById('toast-msg');
            toast.textContent = 'HTML代码已复制，粘贴到邮件</>代码编辑器';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        });
    });

    render();
</script>
</body>
</html>
