<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatherOne签名生成</title>
    <style>
        * {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFBFF;
            color: #000000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .full-screen-wrapper {
            width: 100%;
            max-width: 1300px;
            padding: 60px 40px;
        }
        
        .header {
            margin-bottom: 50px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .header h1 {
            margin: 0;
            font-size: 38px;
            font-weight: 300;
            letter-spacing: -1.5px;
            color: #000000;
            line-height: 1.1;
        }
        .steps {
            font-size: 13px;
            color: #9ca3af;
            margin-top: -40px;
            margin-bottom: 50px;
        }
        
        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 80px;
        }
        
        .form-area {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 13px;
            color: #111111;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 0px;
            color: #000000;
            font-size: 14px;
            transition: all 0.2s ease-in-out;
        }
        
        input:focus {
            outline: none;
            border-color: #000000;
        }
        
        .btn-copy {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 0px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .preview-box {
            background: transparent;
            border: 1px solid #000000;
            border-radius: 0px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 520px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: #ffffff;
            padding: 14px 35px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="full-screen-wrapper">
    <div class="header">
        <h1>GatherOne签名生成</h1>
    </div>
    <div class="steps">1. 填写信息 &nbsp;→&nbsp; 2. 确认并复制 &nbsp;→&nbsp; 3. 粘贴到邮箱签名</div>

    <div class="main-layout">
        <div class="form-area">
            <div class="form-group"><label>姓名</label><input type="text" id="input-name" placeholder="姓名"></div>
            <div class="form-group"><label>职位</label><input type="text" id="input-title" placeholder="职位"></div>
            <div class="form-group"><label>电话</label><input type="text" id="input-tel" placeholder="电话"></div>
            <div class="form-group"><label>微信</label><input type="text" id="input-wechat" placeholder="微信"></div>
            <button class="btn-copy" id="btn-copy-id">确认并复制</button>
        </div>
        
        <div class="preview-area">
            <div class="preview-title" style="font-size: 13px; color: #111111; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;">预览</div>
            <div class="preview-box" id="copy-target"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast-msg">已复制</div>

<script>
    const nameInput = document.getElementById('input-name');
    const titleInput = document.getElementById('input-title');
    const telInput = document.getElementById('input-tel');
    const wechatInput = document.getElementById('input-wechat');
    const previewBox = document.getElementById('copy-target');
    const btnCopy = document.getElementById('btn-copy-id');

    const baseUrl = "https://cdn.jsdelivr.net/gh/G43210/GOsignature@main/signature/assets";
    const addrBannerUrl = baseUrl + "/image_1.png?v=4";
    const partner1Url = baseUrl + "/image_2.png?v=4";
    const partner2Url = baseUrl + "/image_3.png?v=4";

    function render() {
        const name = nameInput.value || "姓名";
        const title = titleInput.value || "职位";
        const tel = telInput.value || "电话";
        const wechat = wechatInput.value || "微信";

        previewBox.innerHTML = `
            <style>
              .s-w{width:600px;display:flex;flex-direction:column;align-items:center;font-family:'HONOR Sans CN','Microsoft YaHei',sans-serif;}
              .s-h{width:600px;display:flex;flex-direction:column;align-items:center;}
              .s-m{width:600px;display:flex;flex-direction:row;align-items:flex-end;position:relative;}
              .s-info{width:328px;display:flex;flex-direction:column;align-items:flex-start;}
              .s-name{display:flex;align-items:flex-end;}
              .s-n{font-size:20px;white-space:nowrap;color:rgba(0,202,211,1);font-weight:300;}
              .s-t{margin-top:8px;margin-left:8px;font-size:14px;white-space:nowrap;color:rgba(0,202,211,1);font-weight:300;}
              .s-c{display:flex;align-items:center;}
              .s-cl{display:flex;align-items:center;font-size:12px;color:rgba(159,159,159,1);line-height:12px;font-weight:300;}
              .s-cr{margin-left:8px;display:flex;align-items:center;font-size:12px;color:rgba(159,159,159,1);line-height:12px;font-weight:300;}
              .s-tel{text-align:right;}
              .s-400{position:absolute;top:19px;left:312px;width:288px;font-size:14.17px;text-align:right;color:rgba(0,202,211,1);font-weight:300;white-space:nowrap;}
              .s-bar{margin-top:8px;width:600px;height:4px;display:flex;}
              .s-bc{width:480px;height:4px;background:rgba(0,203,212,1);}
              .s-bp{width:80px;height:4px;background:rgba(255,138,197,1);}
              .s-bu{width:40px;height:4px;background:rgba(136,123,255,1);}
              .s-addr{margin-top:24px;width:600px;display:flex;flex-direction:column;align-items:flex-start;}
              .s-addr-img{width:110px;height:auto;}
              .s-addr-t{width:392px;margin-top:8px;font-size:12px;color:rgba(159,159,159,1);line-height:14px;font-weight:300;}
              .s-pt{margin-top:24px;width:600px;border-radius:4px;background:rgba(0,202,211,1);padding:8px 16px;display:flex;flex-direction:column;align-items:center;}
              .s-pr{width:568px;display:flex;align-items:center;justify-content:center;}
              .s-pl{width:496px;display:flex;align-items:center;}
              .s-ptxt{font-size:12px;white-space:nowrap;color:#fff;line-height:12px;font-weight:300;}
              .s-pimg{margin-left:24px;width:400px;height:19.29px;}
              .s-pr2{margin-top:8px;width:568px;display:flex;align-items:center;justify-content:center;}
              .s-pl2{width:496px;display:flex;align-items:center;}
              .s-pimg2{margin-left:24px;width:400px;height:18.72px;}
            </style>
            <div class="s-w">
              <div class="s-h">
                <div class="s-m">
                  <div class="s-info">
                    <div class="s-name"><div class="s-n">${name}</div><div class="s-t">${title}</div></div>
                    <div class="s-c"><div class="s-cl"><span class="s-tel">电话</span>&nbsp;${tel}</div><div class="s-cr"><span class="s-tel">微信</span>&nbsp;${wechat}</div></div>
                  </div>
                  <div class="s-400">400-988-5518</div>
                </div>
                <div class="s-bar"><div class="s-bc"></div><div class="s-bp"></div><div class="s-bu"></div></div>
              </div>
              <div class="s-addr">
                <img src="${addrBannerUrl}" class="s-addr-img" />
                <div class="s-addr-t">
                  <div>北京：北京市朝阳区管庄路150号院东方华瑞C座9层</div>
                  <div>杭州：浙江省杭州市西湖区华星时代广场A座903</div>
                  <div>长沙：湖南省长沙市保利国际广场B3栋1613</div>
                  <div>深圳：广东省深圳市南山区华润置地大厦D座6层162</div>
                  <div>合肥：安徽省合肥市蜀山区潜山路华邦世贸中心B座603</div>
                  <div>香港：香港金鐘金鐘道95號統一中心29層A20室</div>
                </div>
              </div>
              <div class="s-pt">
                <div class="s-pr"><div class="s-pl"><div class="s-ptxt">战略合作伙伴</div><img src="${partner1Url}" class="s-pimg" /></div></div>
                <div class="s-pr2"><div class="s-pl2"><div class="s-ptxt">全球合作伙伴</div><img src="${partner2Url}" class="s-pimg2" /></div></div>
              </div>
            </div>
        `;
    }

    [nameInput, titleInput, telInput, wechatInput].forEach(el => el.addEventListener('input', render));

    btnCopy.addEventListener('click', function() {
        const range = document.createRange();
        range.selectNode(previewBox);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        const toast = document.getElementById('toast-msg');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
        window.getSelection().removeAllRanges();
    });

    render();
</script>
</body>
</html>
