<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatherOne签名生成</title>
    <style>
        * {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFBFF;
            color: #000000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .full-screen-wrapper {
            width: 100%;
            max-width: 1300px;
            padding: 60px 40px;
        }
        
        .header {
            margin-bottom: 50px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .header h1 {
            margin: 0;
            font-size: 38px;
            font-weight: 300;
            letter-spacing: -1.5px;
            color: #000000;
            line-height: 1.1;
        }
        .steps {
            font-size: 13px;
            color: #9ca3af;
            margin-top: -40px;
            margin-bottom: 50px;
        }
        
        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 80px;
        }
        
        .form-area {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 13px;
            color: #111111;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 0px;
            color: #000000;
            font-size: 14px;
            transition: all 0.2s ease-in-out;
        }
        
        input:focus {
            outline: none;
            border-color: #000000;
        }
        
        .btn-copy {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 0px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .preview-box {
            background: transparent;
            border: 1px solid #000000;
            border-radius: 0px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 520px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: #ffffff;
            padding: 14px 35px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="full-screen-wrapper">
    <div class="header">
        <h1>GatherOne签名生成</h1>
    </div>
    <div class="steps">1. 填写信息 &nbsp;→&nbsp; 2. 确认并复制 &nbsp;→&nbsp; 3. 粘贴到邮箱签名</div>

    <div class="main-layout">
        <div class="form-area">
            <div class="form-group"><label>姓名</label><input type="text" id="input-name" placeholder="姓名"></div>
            <div class="form-group"><label>职位</label><input type="text" id="input-title" placeholder="职位"></div>
            <div class="form-group"><label>电话</label><input type="text" id="input-tel" placeholder="电话"></div>
            <div class="form-group"><label>微信</label><input type="text" id="input-wechat" placeholder="微信"></div>
            <button class="btn-copy" id="btn-copy-id">确认并复制</button>
        </div>
        
        <div class="preview-area">
            <div class="preview-title" style="font-size: 13px; color: #111111; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;">预览</div>
            <div class="preview-box" id="copy-target"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast-msg">已复制</div>

<script>
    const nameInput = document.getElementById('input-name');
    const titleInput = document.getElementById('input-title');
    const telInput = document.getElementById('input-tel');
    const wechatInput = document.getElementById('input-wechat');
    const previewBox = document.getElementById('copy-target');
    const btnCopy = document.getElementById('btn-copy-id');

    const baseUrl = "https://cdn.jsdelivr.net/gh/G43210/GOsignature@main/signature/assets";
    const addrBannerUrl = baseUrl + "/image_1.png?v=4";
    const partner1Url = baseUrl + "/image_2.png?v=4";
    const partner2Url = baseUrl + "/image_3.png?v=4";

    function render() {
        const name = nameInput.value || "姓名";
        const title = titleInput.value || "职位";
        const tel = telInput.value || "电话";
        const wechat = wechatInput.value || "微信";

        previewBox.innerHTML = `
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;mso-table-lspace:0;mso-table-rspace:0;font-family:'HONOR Sans CN','Microsoft YaHei',sans-serif;background:none;background-color:transparent;">
              <tr>
                <td style="padding:0;vertical-align:bottom;width:312px;">
                  <table cellpadding="0" cellspacing="0" border="0" style="width:100%;">
                    <tr>
                      <td style="padding:0;vertical-align:bottom;">
                        <span style="font-size:20px;color:#00CAD3;font-weight:300;white-space:nowrap;">${name}</span><span style="margin-left:8px;font-size:14px;color:#00CAD3;font-weight:300;white-space:nowrap;">&nbsp;${title}</span>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding-top:4px;">
                        <span style="font-size:12px;color:#9F9F9F;font-weight:300;">电话&nbsp;${tel}</span><span style="margin-left:8px;font-size:12px;color:#9F9F9F;font-weight:300;">&nbsp;微信&nbsp;${wechat}</span>
                      </td>
                    </tr>
                  </table>
                </td>
                <td style="padding:0;vertical-align:bottom;width:288px;text-align:right;">
                  <span style="font-size:14.17px;color:#00CAD3;font-weight:300;white-space:nowrap;">400-988-5518</span>
                </td>
              </tr>
              <tr>
                <td colspan="2" style="padding:8px 0 0 0;">
                  <table width="600" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                    <tr>
                      <td width="480" height="4" style="background:#00CBD4;font-size:0;line-height:0;">&nbsp;</td>
                      <td width="80" height="4" style="background:#FF8AC5;font-size:0;line-height:0;">&nbsp;</td>
                      <td width="40" height="4" style="background:#887BFF;font-size:0;line-height:0;">&nbsp;</td>
                    </tr>
                  </table>
                </td>
              </tr>
              <tr>
                <td colspan="2" style="padding:24px 0 0 0;">
                  <img src="${addrBannerUrl}" width="600" height="16" style="display:block;width:600px;height:auto;" />
                </td>
              </tr>
              <tr>
                <td colspan="2" style="padding:8px 0 0 0;font-size:12px;color:#9F9F9F;line-height:14px;font-weight:300;">
                  北京：北京市朝阳区管庄路150号院东方华瑞C座9层<br>
                  杭州：浙江省杭州市西湖区华星时代广场A座903<br>
                  长沙：湖南省长沙市保利国际广场B3栋1613<br>
                  深圳：广东省深圳市南山区华润置地大厦D座6层162<br>
                  合肥：安徽省合肥市蜀山区潜山路华邦世贸中心B座603<br>
                  香港：香港金鐘金鐘道95號統一中心29層A20室
                </td>
              </tr>
              <tr>
                <td colspan="2" style="padding:24px 0 0 0;">
                  <table width="600" cellpadding="0" cellspacing="0" border="0" style="border-radius:4px;background:#00CAD3;border-collapse:collapse;mso-table-lspace:0;mso-table-rspace:0;">
                    <tr>
                      <td style="padding:8px 16px;">
                        <table width="568" cellpadding="0" cellspacing="0" border="0" align="center" style="border-collapse:collapse;">
                          <tr>
                            <td align="center" style="padding:0;">
                              <span style="font-size:12px;color:#fff;font-weight:300;white-space:nowrap;">战略合作伙伴</span><img src="${partner1Url}" width="400" height="19" style="display:inline-block;width:400px;height:auto;vertical-align:middle;margin-left:24px;" />
                            </td>
                          </tr>
                          <tr>
                            <td align="center" style="padding:8px 0 0 0;">
                              <span style="font-size:12px;color:#fff;font-weight:300;white-space:nowrap;">全球合作伙伴</span><img src="${partner2Url}" width="400" height="19" style="display:inline-block;width:400px;height:auto;vertical-align:middle;margin-left:24px;" />
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
        `;
    }

    [nameInput, titleInput, telInput, wechatInput].forEach(el => el.addEventListener('input', render));

    btnCopy.addEventListener('click', function() {
        const range = document.createRange();
        range.selectNode(previewBox);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        const toast = document.getElementById('toast-msg');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
        window.getSelection().removeAllRanges();
    });

    render();
</script>
</body>
</html>
